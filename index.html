<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="lordlabs.dev - Building the future of software."
    />
    <meta name="theme-color" content="#050505" />
    <title>lordlabs.dev</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="overflow-hidden text-zinc-100 antialiased">
    <main
      class="page-shell relative flex min-h-dvh items-center justify-center px-6"
      aria-labelledby="site-title"
    >
      <section class="flex -translate-y-5 flex-col items-center text-center sm:-translate-y-6">
        <h1 id="site-title" class="sr-only">lordlabs.dev</h1>
        <img
          class="brand-logo logo-glow"
          src="assets/lord-logo.png"
          alt="Lord"
          width="100"
          height="48"
        />
        <p class="mt-9 text-[0.76rem] font-light text-zinc-400 sm:text-sm">
          Building the future of software.
        </p>
      </section>

      <a
        class="contact-link fixed bottom-7 left-1/2 -translate-x-1/2 text-[0.68rem] font-light uppercase text-zinc-600"
        href="mailto:contact@lordlabs.dev"
        aria-label="Contact lordlabs.dev"
      >
        Contact
      </a>
    </main>
  </body>
</html>
