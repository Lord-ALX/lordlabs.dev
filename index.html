    <meta charset="UTF-8" />

    <meta
      name="description"
      content="lordlabs.dev - Building the future of software."
    />
    <meta name="theme-color" content="#050505" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&amp;display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: dark;
        --lord-green: #7cff00;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #050505;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
          Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .page-shell {
        animation: fade-in 900ms ease-out both;
      }

      .logo-glow {
        filter:
          drop-shadow(0 0 10px rgba(124, 255, 0, 0.34))
          drop-shadow(0 0 32px rgba(124, 255, 0, 0.18));
      }

      .contact-link {
        transition:
          color 180ms ease,
          opacity 180ms ease,
          text-shadow 180ms ease;
      }

      .contact-link:hover,
      .contact-link:focus-visible {
        color: var(--lord-green);
        opacity: 1;
        outline: none;
        text-shadow: 0 0 18px rgba(124, 255, 0, 0.35);
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .page-shell {
          animation: none;
        }

        .contact-link {
          transition: none;
        }
      }
    </style>
  </head>
